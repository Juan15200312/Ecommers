<section class="w-100 h-100 d-flex flex-column align-items-center justify-content-center p-4">
    <div class="w-100 mixin cont-white-shadow rounded-3 px-4 py-4 d-flex flex-column">
        <div class="bg-primary icon rounded-3 d-flex align-items-center justify-content-center align-self-center">
            <i class="fa-solid fa-shop text-white fs-2"></i>
        </div>

        <div class="mt-4 text-center">
            <h2 class="fw-bolder m-0 p-0">E-commerce Admin</h2>
            <span class="fw-light mt-1">Inicia sesión para gestionar tu tienda</span>
        </div>

        <form class="mt-5">
            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••">
            </div>

            <button class="btn btn-primary w-100 mt-3">
                Iniciar sesión
            </button>
        </form>

        <div class="w-100 text-center mt-4">
            <span class="fw-light">Acceso restringido para personal autorizado.</span>
        </div>
    </div>
</section>
